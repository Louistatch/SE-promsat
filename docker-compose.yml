version: "3.9"

services:
  backend:
    build: ./backend
    container_name: prosmat_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: prosmat_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
